name: Deploy to Hostinger

on:
  push:
    branches: [main]

#Prevent overlapping deploys
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run deploy script on Hostinger (retry once)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          debug: true
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e

            echo "Deploy attempt 1..."
            if bash ~/deploy.sh; then
              echo "Deploy succeeded (attempt 1)"
              exit 0
            fi

            echo "Deploy failed. Waiting 15s then retrying..."
            sleep 15

            echo "Deploy attempt 2..."
            bash ~/deploy.sh
