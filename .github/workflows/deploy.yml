name: Test and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, bcmath, sqlite
          coverage: none

      # ✅ Create .env + folders BEFORE installation
      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p storage/framework/{cache,sessions,views}
          mkdir -p bootstrap/cache

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate key and setup
        run: |
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate

      - name: Run tests
        run: php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 187.77.177.77 >> ~/.ssh/known_hosts

      - name: Deploy (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no IdentitiesOnly=yes root@187.77.177.77 << 'EOF'
            set -e

            cd /var/www/perfume-formulation-manager

            php artisan down || true

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            composer install --no-dev --optimize-autoloader

            mkdir -p storage/framework/{cache,sessions,views}
            mkdir -p bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            php artisan migrate --force

            php artisan up
            EOF
